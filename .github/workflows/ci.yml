name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/markdown-api

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: backend/markdown-api/go.sum

      - run: go vet ./...

      - run: go build ./...

      - run: go test ./... || true

  docker:
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: backend/markdown-api
          push: false
          tags: markdown-api:ci

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          push: false
          tags: markdown-frontend:ci

  integration:
    needs: docker
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: markdownkb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Start backend
        run: |
          docker compose -f infra/docker-compose.yml up -d --build backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/markdownkb?sslmode=disable

      - name: Wait for backend
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8085/health && break
            sleep 2
          done

      - name: Health check
        run: curl -sf http://localhost:8085/health

      - name: Create document
        run: |
          curl -sf -X POST http://localhost:8085/documents \
            -H 'Content-Type: application/json' \
            -d '{"title":"CI Test","content":"# Hello\nCI!"}' | tee /dev/stderr | grep -q '"id":'

      - name: List documents
        run: curl -sf http://localhost:8085/documents

      - name: Cleanup
        run: docker compose -f infra/docker-compose.yml down -v
        if: always()

  publish:
    needs: integration
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Lowercase repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: backend/markdown-api
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/backend:latest
            ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/frontend:latest
            ghcr.io/${{ env.REPO_LC }}/frontend:${{ github.sha }}

  deploy-aws:
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
      HOST: ${{ vars.AWS_HOST }}

    steps:
      - name: Deploy to k3s
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/aws_key
          chmod 600 ~/.ssh/aws_key
          wc -c ~/.ssh/aws_key
          ssh-keygen -y -f ~/.ssh/aws_key
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/aws_key \
              admin@$HOST << 'EOF'
            sudo k3s kubectl rollout restart deployment/backend deployment/frontend -n markdownkb
            sudo k3s kubectl rollout status deployment/backend -n markdownkb --timeout=120s
            sudo k3s kubectl rollout status deployment/frontend -n markdownkb --timeout=120s
          EOF
