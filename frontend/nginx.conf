resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /health {
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
    }

    location /documents {
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
    }
}
