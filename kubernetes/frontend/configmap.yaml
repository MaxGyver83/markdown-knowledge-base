apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri /index.html;
        }

        location /health {
            proxy_pass http://backend:8080;
        }

        location /documents {
            proxy_pass http://backend:8080;
        }
    }
